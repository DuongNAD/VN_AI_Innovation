databases:
  - name: psp-db
    plan: free

services:
  - type: web
    name: psp-assistant
    runtime: docker
    plan: free
    # Blueprint lives at the repo root; the app (and its Dockerfile) live here.
    rootDir: projects/build_a_full_stack_web_app_ai_guided_pub_4eaf5f22
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: psp-db
          property: connectionString
      - key: ADMIN_TOKEN
        generateValue: true
      - key: MANAGER_TOKEN
        generateValue: true
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: TRUST_PROXY
        value: "1"
      - key: SESSION_TTL_HOURS
        value: "24"
      - key: NODE_ENV
        value: production
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"
name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: psp
          # Throwaway CI-only service password; not a secret.
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: psp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U psp -d psp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: projects/build_a_full_stack_web_app_ai_guided_pub_4eaf5f22

    env:
      DATABASE_URL: postgresql://psp:postgres@localhost:5432/psp
      POSTGRES_PASSWORD: postgres
      AI_PROVIDER: mock
      TRUST_PROXY: "0"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: projects/build_a_full_stack_web_app_ai_guided_pub_4eaf5f22/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate throwaway CI admin token
        # Generated per-run so no token-looking literal lives in the repo.
        run: echo "ADMIN_TOKEN=ci-$(openssl rand -hex 24)" >> "$GITHUB_ENV"

      - name: Audit dependencies
        # Informational: a new upstream advisory should not block unrelated changes.
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Prepare and seed PostgreSQL
        run: |
          npm run db:push
          npm run seed

      - name: Run unit and route tests
        run: npm test -- --run

      - name: Run PostgreSQL integration tests
        # test:integration passes --env-file=.env to node; CI supplies env vars
        # at the job level, so an empty file satisfies the flag.
        run: |
          touch .env
          npm run test:integration

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build production application
        run: npm run build

      - name: Validate container configuration
        run: docker compose config --quiet
